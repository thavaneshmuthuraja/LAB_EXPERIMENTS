<!DOCTYPE html>
<html>
<head>
    <title>Fruit Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #fff9c4 100%);
            min-height: 100vh;
            padding: 30px 16px;
        }

        h2 {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        /* ── FRUIT PANEL ── */
        .panel {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #aaa;
            margin-bottom: 16px;
        }

        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .fruit-card {
            background: #f9fbe7;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
        }

        .fruit-card:hover {
            border-color: #66bb6a;
            background: #f1f8e9;
            transform: translateY(-2px);
        }

        .fruit-card:active { transform: scale(0.96); }

        .fruit-emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
        }

        .fruit-name {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            display: block;
        }

        .fruit-price {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* ── CART PANEL ── */
        .cart-panel {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .cart-badge {
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
        }

        #cart {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 2px;
        }

        #cart::-webkit-scrollbar { width: 4px; }
        #cart::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 4px; }

        .empty-msg {
            text-align: center;
            color: #ccc;
            font-size: 13px;
            padding: 30px 0;
        }

        .empty-msg span { font-size: 36px; display: block; margin-bottom: 8px; }

        #cart li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fafafa;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }

        .item-info { flex: 1; }

        .item-name {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .item-subtotal {
            font-size: 11px;
            color: #888;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: none;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            line-height: 1;
            padding: 0;
        }

        .qty-btn:hover { background: #c8e6c9; }

        .qty-num {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            min-width: 18px;
            text-align: center;
        }

        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 14px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            font-size: 14px;
            font-weight: 500;
            color: #666;
        }

        .total-amount {
            font-size: 22px;
            font-weight: 700;
            color: #2e7d32;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .checkout-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .checkout-btn:active { transform: scale(0.98); }

        @media (max-width: 560px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<h2>🛒 Fruit Cart</h2>
<p class="subtitle">Pick fresh fruits and add them to your cart</p>

<div class="container">

    <!-- Fruit Panel -->
    <div class="panel">
        <div class="panel-title">Choose Fruits</div>
        <div class="fruit-grid">
            <div class="fruit-card" onclick="addItem('Apple', 50)">
                <span class="fruit-emoji">🍎</span>
                <span class="fruit-name">Apple</span>
                <div class="fruit-price">₹50</div>
            </div>
            <div class="fruit-card" onclick="addItem('Banana', 20)">
                <span class="fruit-emoji">🍌</span>
                <span class="fruit-name">Banana</span>
                <div class="fruit-price">₹20</div>
            </div>
            <div class="fruit-card" onclick="addItem('Orange', 30)">
                <span class="fruit-emoji">🍊</span>
                <span class="fruit-name">Orange</span>
                <div class="fruit-price">₹30</div>
            </div>
            <div class="fruit-card" onclick="addItem('Grapes', 40)">
                <span class="fruit-emoji">🍇</span>
                <span class="fruit-name">Grapes</span>
                <div class="fruit-price">₹40</div>
            </div>
            <div class="fruit-card" onclick="addItem('Mango', 60)">
                <span class="fruit-emoji">🥭</span>
                <span class="fruit-name">Mango</span>
                <div class="fruit-price">₹60</div>
            </div>
            <div class="fruit-card" onclick="addItem('Pineapple', 80)">
                <span class="fruit-emoji">🍍</span>
                <span class="fruit-name">Pineapple</span>
                <div class="fruit-price">₹80</div>
            </div>
            <div class="fruit-card" onclick="addItem('Strawberry', 70)">
                <span class="fruit-emoji">🍓</span>
                <span class="fruit-name">Strawberry</span>
                <div class="fruit-price">₹70</div>
            </div>
            <div class="fruit-card" onclick="addItem('Watermelon', 90)">
                <span class="fruit-emoji">🍉</span>
                <span class="fruit-name">Watermelon</span>
                <div class="fruit-price">₹90</div>
            </div>
            <div class="fruit-card" onclick="addItem('Peach', 55)">
                <span class="fruit-emoji">🍑</span>
                <span class="fruit-name">Peach</span>
                <div class="fruit-price">₹55</div>
            </div>
        </div>
    </div>

    <!-- Cart Panel -->
    <div class="cart-panel">
        <div class="cart-header">
            <div class="panel-title" style="margin:0">Your Cart</div>
            <span class="cart-badge" id="cart-count">0 items</span>
        </div>

        <ul id="cart">
            <li style="border:none;background:none;justify-content:center" id="empty-msg">
                <div class="empty-msg"><span>🛒</span>Your cart is empty</div>
            </li>
        </ul>

        <div class="divider"></div>

        <div class="total-row">
            <span class="total-label">Total</span>
            <span class="total-amount">₹<span id="total">0</span></span>
        </div>

        <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>

</div>

<script>
    var cart = [];

    function addItem(name, price) {
        for (var i = 0; i < cart.length; i++) {
            if (cart[i].name == name) {
                cart[i].qty++;
                showCart();
                return;
            }
        }
        cart.push({ name: name, price: price, qty: 1 });
        showCart();
    }

    function minusItem(name) {
        for (var i = 0; i < cart.length; i++) {
            if (cart[i].name == name) {
                cart[i].qty--;
                if (cart[i].qty <= 0) cart.splice(i, 1);
            }
        }
        showCart();
    }

    function showCart() {
        var list = document.getElementById("cart");
        list.innerHTML = "";
        var total = 0;
        var totalQty = 0;

        if (cart.length === 0) {
            list.innerHTML = '<li style="border:none;background:none;justify-content:center"><div class="empty-msg"><span>🛒</span>Your cart is empty</div></li>';
            document.getElementById("total").innerText = 0;
            document.getElementById("cart-count").innerText = "0 items";
            return;
        }

        for (var i = 0; i < cart.length; i++) {
            total += cart[i].price * cart[i].qty;
            totalQty += cart[i].qty;
            list.innerHTML +=
                '<li>' +
                '<div class="item-info">' +
                '<div class="item-name">' + cart[i].name + '</div>' +
                '<div class="item-subtotal">₹' + cart[i].price + ' × ' + cart[i].qty + ' = ₹' + (cart[i].price * cart[i].qty) + '</div>' +
                '</div>' +
                '<div class="qty-controls">' +
                '<button class="qty-btn" onclick="minusItem(\'' + cart[i].name + '\')">−</button>' +
                '<span class="qty-num">' + cart[i].qty + '</span>' +
                '<button class="qty-btn" onclick="addItem(\'' + cart[i].name + '\', ' + cart[i].price + ')">+</button>' +
                '</div>' +
                '</li>';
        }

        document.getElementById("total").innerText = total;
        document.getElementById("cart-count").innerText = totalQty + (totalQty === 1 ? " item" : " items");
    }

    function checkout() {
        if (cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }
        alert("✅ Order placed successfully!\nTotal: ₹" + document.getElementById("total").innerText);
        cart = [];
        showCart();
    }
</script>

</body>
</html>
